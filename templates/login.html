<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epione — Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root { --accent: #10069F; --accent-dark: #0A0470; --black: #282828; --gray: #F5F5F7; --border: #E5E5EA; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito Sans',sans-serif; background:var(--gray); min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-card {
  background:#fff; border-radius:16px; padding:48px 40px; width:100%; max-width:380px;
  box-shadow:0 2px 12px rgba(0,0,0,0.08); text-align:center;
}
.logo { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px; }
.logo-brand { font-size:16px; font-weight:700; letter-spacing:2px; color:var(--accent); }
.logo-sub { font-size:11px; color:#888; letter-spacing:1px; margin-bottom:32px; }
input[type="password"] {
  width:100%; padding:14px 16px; border:1px solid var(--border); border-radius:10px;
  font-family:inherit; font-size:15px; outline:none; transition:border .2s;
}
input[type="password"]:focus { border-color:var(--accent); }
.btn {
  width:100%; padding:14px; border:none; border-radius:24px; margin-top:16px;
  background:var(--accent); color:#fff; font-family:inherit; font-size:15px;
  font-weight:600; cursor:pointer; transition:background .2s;
}
.btn:hover { background:var(--accent-dark); }
.error { color:#e53e3e; font-size:13px; margin-top:12px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 120 120" fill="none">
      <circle cx="60" cy="60" r="52" stroke="#10069F" stroke-width="1.5" opacity=".3"/>
      <circle cx="60" cy="60" r="38" stroke="#10069F" stroke-width="2" opacity=".5"/>
      <circle cx="60" cy="60" r="24" stroke="#10069F" stroke-width="2.5" opacity=".7"/>
      <circle cx="60" cy="60" r="10" fill="#10069F"/>
    </svg>
    <span class="logo-brand">EPIONE</span>
  </div>
  <div class="logo-sub">Content Agent</div>
  <form method="POST">
    <input type="password" name="password" placeholder="Nhập mật khẩu" autofocus required>
    <button type="submit" class="btn">Đăng nhập</button>
  </form>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
</div>
</body>
</html>
