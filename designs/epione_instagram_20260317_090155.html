<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epione - Instagram Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: 'Nunito Sans', sans-serif;
            padding: 40px;
        }
        .post-container {
            width: 1080px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .post-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0) 30%,
                rgba(0,0,0,0.4) 100%
            );
        }
        .text-content {
            position: absolute;
            left: 40px;
            right: 40px;
            top: 50%; transform: translateY(-50%);
            z-index: 2;
        }
        .headline {
            font-size: 28px;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 1.3;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .logo {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
        }
        .logo-text {
            color: #FFFFFF;
            font-size: 12px;
            letter-spacing: 2px;
            font-weight: 700;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .logo-sub {
            font-weight: 400;
            font-size: 9px;
            letter-spacing: 1px;
        }
        .controls {
            margin-top: 30px;
            text-align: center;
            font-family: 'Nunito Sans', sans-serif;
        }
        .controls button {
            background: #10069F;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 0 8px;
            font-family: inherit;
        }
        .controls button:hover {
            background: #0A0470;
        }
        .controls button.outline {
            background: transparent;
            border: 1px solid #EDEDED;
            color: #282828;
        }
    </style>
</head>
<body>
    <div>
        <div class="post-container" id="post">
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkCAIAAAD/gAIDAAAAtUlEQVR4nO3QUQkAIBTAQPsneyEMYwV/ZAgHCzBuzWxdtvKDj4IFC1YeLFiw8mDBgpUHCxasPFiwYOXBggUrDxYsWHmwYMHKgwULVh4sWLDyYMGClQcLFqw8WLBg5cGCBSsPFixYebBgwcqDBQtWHixYsPJgwYKVBwsWrDxYsGDlwYIFKw8WLFh5sGDByoMFC1YeLFiw8mDBgpUHCxasPFiwYOXBggUrDxYsWHmwYMHKgwXrTQf4XKBDTTDXWQAAAABJRU5ErkJggg==" class="post-image" alt="Epione post">

            <div class="overlay"></div>

            <!-- Logo -->
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 120 120" fill="none">
                    <circle cx="60" cy="60" r="55" stroke="#FFFFFF" stroke-width="1.5" opacity="0.25"/>
                    <circle cx="60" cy="60" r="42" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
                    <circle cx="60" cy="60" r="28" stroke="#FFFFFF" stroke-width="2.5" opacity="0.65"/>
                    <circle cx="60" cy="60" r="12" fill="#FFFFFF"/>
                </svg>
                <div>
                    <div class="logo-text">FOCUS</div>
                    <div class="logo-text logo-sub">by Epione</div>
                </div>
            </div>

            <!-- Text content -->
            <div class="text-content">
                <div class="headline">Không gian tập trung hoàn hảo</div>
                
            <div style="
                font-size: 16px;
                font-weight: 400;
                color: #FFFFFF;
                opacity: 0.9;
                margin-top: 8px;
                line-height: 1.5;
            ">Booth cách âm FocusBooth</div>
            
                
            <div style="margin-top: 20px;">
                <span style="
                    display: inline-block;
                    background: #10069F;
                    color: #FFFFFF;
                    padding: 12px 32px;
                    border-radius: 24px;
                    font-weight: 600;
                    font-size: 14px;
                    letter-spacing: 0.5px;
                ">Liên hệ tư vấn</span>
            </div>
            
            </div>
        </div>

        <div class="controls">
            <button onclick="downloadPost()">Tải ảnh (Screenshot)</button>
            <button class="outline" onclick="window.print()">In / PDF</button>
        </div>
    </div>

    <script>
        function downloadPost() {
            alert('Tip: Dùng tổ hợp phím Cmd+Shift+4 (Mac) hoặc Snipping Tool (Windows) để chụp vùng post.\n\nHoặc dùng browser extension như GoFullPage để capture chính xác.');
        }
    </script>
</body>
</html>
